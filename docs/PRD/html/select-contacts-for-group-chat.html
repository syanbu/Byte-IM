<script data-purpose="ui-interactions">
    // Mock selection logic for the "Done" button
    const rows = document.querySelectorAll('[data-purpose="contact-row"]');
    const doneButton = document.querySelector('[data-purpose="done-button"]');
    let selectedCount = 0;

    rows.forEach(row => {
      row.addEventListener('click', () => {
        const checkbox = row.querySelector('div');
        const isSelected = checkbox.classList.contains('bg-proton-green');
        
        if (isSelected) {
          checkbox.classList.remove('bg-proton-green', 'border-proton-green');
          checkbox.classList.add('border-gray-300');
          checkbox.innerHTML = '';
          selectedCount--;
        } else {
          checkbox.classList.remove('border-gray-300');
          checkbox.classList.add('bg-proton-green', 'border-proton-green');
          checkbox.innerHTML = '<svg class="w-full h-full text-white p-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>';
          selectedCount++;
        }

        // Update button appearance
        if (selectedCount > 0) {
          doneButton.classList.remove('bg-[#e1e1e1]');
          doneButton.classList.add('bg-proton-green');
          doneButton.textContent = `完成(${selectedCount})`;
        } else {
          doneButton.classList.add('bg-[#e1e1e1]');
          doneButton.classList.remove('bg-proton-green');
          doneButton.textContent = '完成';
        }
      });
    });
  </script>
