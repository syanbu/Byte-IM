<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        input:focus { outline: none !important; border-color: transparent !important; ring: 0 !important; }
        .transition-all-custom { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .loader {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #07c160;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background flex flex-col font-body-message text-on-surface overflow-hidden" style="width: 390px; height: 884px; margin: 0px auto; overflow: hidden; position: relative;">
<main class="flex-grow flex flex-col items-center justify-center px-edge-margin pb-20 max-h-full">
<div class="w-full max-w-[400px] flex flex-col items-center">
<div class="mb-12 text-center">
<h1 class="font-nav-title text-[28px] font-bold text-on-surface mb-2">ByteIM</h1>
<p class="font-list-preview text-text-secondary">Secure, private, and entirely yours.</p>
</div>
<form class="w-full space-y-0 bg-surface rounded-xl overflow-hidden shadow-sm border border-divider" id="authForm">
<div class="px-5 py-4 border-b border-divider flex items-center">
<label class="w-24 font-list-title text-on-surface" for="phone">Phone</label>
<input class="flex-grow bg-transparent border-none p-0 font-body-message focus:ring-0 placeholder:text-surface-variant" id="phone" placeholder="Enter phone number" type="tel">
</div>
<div class="px-5 py-4 border-b border-divider flex items-center">
<label class="w-24 font-list-title text-on-surface" for="password">Password</label>
<input class="flex-grow bg-transparent border-none p-0 font-body-message focus:ring-0 placeholder:text-surface-variant" id="password" placeholder="Enter password" type="password">
</div>
<div class="px-5 py-0 overflow-hidden transition-all-custom max-h-0 flex items-center opacity-0" id="confirmPasswordField">
<label class="w-24 font-list-title text-on-surface" for="confirm_password">Confirm</label>
<input class="flex-grow bg-transparent border-none p-0 font-body-message focus:ring-0 placeholder:text-surface-variant" id="confirm_password" placeholder="Repeat password" type="password">
</div>
</form>
<div class="w-full mt-4 h-6 opacity-0 transition-opacity" id="errorMessage">
<p class="font-system-notice text-status-error text-center">Invalid phone number or password.</p>
</div>
<div class="w-full mt-8 space-y-4">
<button class="w-full h-12 bg-primary-container text-white font-list-title rounded-lg flex items-center justify-center active:opacity-80 transition-all duration-150 shadow-sm" id="submitBtn" onclick="handleAuth()">
<span id="btnText" class="">Log In</span>
<div class="loader ml-3 hidden" id="loadingSpinner"></div>
</button>
<div class="flex justify-center">
<button class="font-list-preview text-primary font-medium hover:underline" id="toggleModeBtn" onclick="toggleAuthMode()">
                        Create account
                    </button>
</div>
</div>
</div>
</main>
<footer class="p-8 text-center">
<p class="font-system-notice text-text-secondary">By continuing, you agree to our Terms of Service.</p>
</footer>
<script>
        let isLoginMode = true;
        let isLoading = false;

        function toggleAuthMode() {
            if (isLoading) return;
            
            isLoginMode = !isLoginMode;
            const confirmField = document.getElementById('confirmPasswordField');
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const toggleBtn = document.getElementById('toggleModeBtn');
            const errorMsg = document.getElementById('errorMessage');

            errorMsg.classList.add('opacity-0');

            if (isLoginMode) {
                confirmField.classList.remove('max-h-20', 'opacity-100', 'py-4', 'border-b');
                confirmField.classList.add('max-h-0', 'opacity-0', 'py-0');
                btnText.textContent = 'Log In';
                toggleBtn.textContent = 'Create account';
            } else {
                confirmField.classList.remove('max-h-0', 'opacity-0', 'py-0');
                confirmField.classList.add('max-h-20', 'opacity-100', 'py-4', 'border-b');
                btnText.textContent = 'Register';
                toggleBtn.textContent = 'Back to login';
            }
        }

        function handleAuth() {
            if (isLoading) return;
            
            const errorMsg = document.getElementById('errorMessage');
            const spinner = document.getElementById('loadingSpinner');
            const btnText = document.getElementById('btnText');
            
            isLoading = true;
            errorMsg.classList.add('opacity-0');
            spinner.classList.remove('hidden');
            
            // Simulate API Call
            setTimeout(() => {
                isLoading = false;
                spinner.classList.add('hidden');
                
                // Show mock error for demonstration
                errorMsg.classList.remove('opacity-0');
                
                // Reset after 3 seconds
                setTimeout(() => {
                    errorMsg.classList.add('opacity-0');
                }, 3000);
            }, 1500);
        }
    </script>
